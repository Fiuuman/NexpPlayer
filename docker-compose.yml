version: '3.8'

services:
  backend:
    build: ./server  # путь к папке с вашим бэкендом
    container_name: music_app_backend
    ports:
      - "3000:3000"
    volumes:
      # Важно: прокидываем папку с базой и загрузками на хост, 
      # чтобы данные сохранялись после выключения докера
      - ./server/data:/app/data
      - ./server/uploads:/app/uploads
      # Позволяет менять код сервера без пересборки образа (Hot Reload)
      - ./server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
    restart: always
